<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Cron Helper', ~{::content})}">
<body>
<th:block th:fragment="content">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">HomeUtils</a></li>
            <li class="breadcrumb-item active">Cron Helper</li>
        </ol>
    </nav>
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="bi bi-clock me-2"></i>Cron Helper</h4>
                </div>
                <div class="card-body p-4">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Cron Expression</label>
                        <input id="cronExpr" type="text" class="form-control font-monospace"
                               placeholder="e.g. 0 9 * * 1-5" value="0 9 * * 1-5"/>
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-sm-6">
                            <label class="form-label fw-semibold">Format</label>
                            <select id="cronType" class="form-select">
                                <option value="UNIX">Unix (5 fields)</option>
                                <option value="QUARTZ">Quartz (6 fields)</option>
                                <option value="SPRING">Spring (6 fields)</option>
                            </select>
                        </div>
                        <div class="col-sm-6">
                            <label class="form-label fw-semibold">Next N runs</label>
                            <input id="cronCount" type="number" class="form-control" value="10" min="1" max="50"/>
                        </div>
                    </div>
                    <button class="btn btn-primary" onclick="describe()">
                        <i class="bi bi-play me-1"></i>Describe
                    </button>

                    <div id="errorArea" class="mt-3 alert alert-danger d-none"></div>

                    <div id="resultArea" class="mt-4 d-none">
                        <div class="alert alert-info mb-3">
                            <i class="bi bi-chat-quote me-2"></i>
                            <strong id="description"></strong>
                        </div>
                        <label class="form-label fw-semibold text-muted small">NEXT SCHEDULED RUNS</label>
                        <ul id="nextRuns" class="list-group font-monospace"></ul>
                    </div>

                    <div class="mt-4 p-3 bg-light border rounded">
                        <p class="fw-semibold mb-2 small text-muted">QUICK EXAMPLES</p>
                        <div class="d-flex flex-wrap gap-2">
                            <button class="btn btn-sm btn-outline-secondary" onclick="setExpr('* * * * *')">Every minute</button>
                            <button class="btn btn-sm btn-outline-secondary" onclick="setExpr('0 * * * *')">Every hour</button>
                            <button class="btn btn-sm btn-outline-secondary" onclick="setExpr('0 0 * * *')">Daily midnight</button>
                            <button class="btn btn-sm btn-outline-secondary" onclick="setExpr('0 9 * * 1-5')">Weekdays 9am</button>
                            <button class="btn btn-sm btn-outline-secondary" onclick="setExpr('0 0 1 * *')">Monthly</button>
                            <button class="btn btn-sm btn-outline-secondary" onclick="setExpr('0 0 * * 0')">Weekly Sunday</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        function setExpr(v) { document.getElementById('cronExpr').value = v; describe(); }
        async function describe() {
            const expression = document.getElementById('cronExpr').value.trim();
            const type  = document.getElementById('cronType').value;
            const count = document.getElementById('cronCount').value;
            const err = document.getElementById('errorArea');
            const res = document.getElementById('resultArea');
            err.classList.add('d-none'); res.classList.add('d-none');

            const resp = await fetch('/utils/cron/describe', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({expression, type, count})
            });
            const data = await resp.json();
            if (!resp.ok || data.error) { err.textContent = data.error; err.classList.remove('d-none'); return; }
            document.getElementById('description').textContent = data.description;
            const ul = document.getElementById('nextRuns');
            ul.innerHTML = data.nextRuns.map((r, i) =>
                `<li class="list-group-item d-flex justify-content-between align-items-center">
                    <span>${r}</span>
                    <span class="badge bg-secondary rounded-pill">#${i+1}</span>
                </li>`).join('');
            res.classList.remove('d-none');
        }
        describe();
    </script>
</th:block>
</body>
</html>
