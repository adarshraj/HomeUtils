<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Timestamp Converter', ~{::content})}">
<body>
<th:block th:fragment="content">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">HomeUtils</a></li>
            <li class="breadcrumb-item active">Timestamp Converter</li>
        </ol>
    </nav>
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                    <h4 class="mb-0"><i class="bi bi-clock-history me-2"></i>Timestamp Converter</h4>
                    <button class="btn btn-sm btn-light" onclick="useNow()"><i class="bi bi-stopwatch me-1"></i>Now</button>
                </div>
                <div class="card-body p-4">
                    <ul class="nav nav-tabs mb-3">
                        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#epochTab">Epoch → Date</button></li>
                        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#dateTab">Date → Epoch</button></li>
                    </ul>
                    <div class="tab-content">
                        <div class="tab-pane fade show active" id="epochTab">
                            <div class="row g-2 mb-3">
                                <div class="col-md-6"><input id="epochValue" class="form-control font-monospace" placeholder="1735689600"/></div>
                                <div class="col-md-3">
                                    <select id="epochUnit" class="form-select">
                                        <option value="s">seconds</option>
                                        <option value="ms">milliseconds</option>
                                        <option value="us">microseconds</option>
                                    </select>
                                </div>
                                <div class="col-md-3"><input id="epochZone" class="form-control" value="UTC" placeholder="UTC"/></div>
                            </div>
                            <button class="btn btn-primary w-100" onclick="fromEpoch()"><i class="bi bi-arrow-right-circle me-1"></i>Convert</button>
                        </div>
                        <div class="tab-pane fade" id="dateTab">
                            <div class="row g-2 mb-3">
                                <div class="col-md-8"><input id="dateValue" class="form-control font-monospace" placeholder="2026-04-23T10:30:00"/></div>
                                <div class="col-md-4"><input id="dateZone" class="form-control" value="UTC" placeholder="UTC"/></div>
                            </div>
                            <button class="btn btn-primary w-100" onclick="fromDate()"><i class="bi bi-arrow-right-circle me-1"></i>Convert</button>
                        </div>
                    </div>
                    <div id="errorArea" class="mt-3 alert alert-danger d-none"></div>
                    <div id="resultArea" class="mt-4 d-none"></div>
                </div>
            </div>
        </div>
    </div>
    <script>
        function render(data) {
            const r = document.getElementById('resultArea');
            r.innerHTML = '';
            Object.entries(data).forEach(([k, v]) => {
                r.insertAdjacentHTML('beforeend',
                    `<div class="mb-2">
                        <label class="form-label small fw-semibold mb-1">${k}</label>
                        <div class="input-group">
                            <input class="form-control font-monospace small" readonly value="${v}"/>
                            <button class="btn btn-outline-secondary" onclick="navigator.clipboard.writeText('${v}')"><i class="bi bi-clipboard"></i></button>
                        </div>
                    </div>`);
            });
            r.classList.remove('d-none');
        }
        async function fromEpoch() {
            const err = document.getElementById('errorArea'); err.classList.add('d-none');
            const resp = await fetch('/utils/timestamp/from-epoch', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    value: document.getElementById('epochValue').value,
                    unit: document.getElementById('epochUnit').value,
                    zone: document.getElementById('epochZone').value || 'UTC'
                })
            });
            const data = await resp.json();
            if (!resp.ok || data.error) { err.textContent = data.error || 'Error'; err.classList.remove('d-none'); return; }
            render(data);
        }
        async function fromDate() {
            const err = document.getElementById('errorArea'); err.classList.add('d-none');
            const resp = await fetch('/utils/timestamp/from-date', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    value: document.getElementById('dateValue').value,
                    zone: document.getElementById('dateZone').value || 'UTC'
                })
            });
            const data = await resp.json();
            if (!resp.ok || data.error) { err.textContent = data.error || 'Error'; err.classList.remove('d-none'); return; }
            render(data);
        }
        async function useNow() {
            const resp = await fetch('/utils/timestamp/now');
            const data = await resp.json();
            document.getElementById('epochValue').value = data.epochSeconds;
            document.getElementById('epochUnit').value = 's';
            fromEpoch();
        }
    </script>
</th:block>
</body>
</html>
