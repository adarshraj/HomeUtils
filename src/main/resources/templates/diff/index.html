<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Text Diff', ~{::content})}">
<body>
<th:block th:fragment="content">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">HomeUtils</a></li>
            <li class="breadcrumb-item active">Text Diff</li>
        </ol>
    </nav>
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0"><i class="bi bi-file-diff me-2"></i>Text Diff</h4>
        </div>
        <div class="card-body p-4">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Original</label>
                    <textarea id="left" class="form-control font-monospace small" rows="12"></textarea>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Changed</label>
                    <textarea id="right" class="form-control font-monospace small" rows="12"></textarea>
                </div>
            </div>
            <button class="btn btn-primary w-100 mt-3" onclick="run()"><i class="bi bi-file-diff me-1"></i>Compare</button>
            <div id="resultArea" class="mt-4 d-none">
                <div class="mb-3 small">
                    <span class="badge bg-success me-2">+<span id="added">0</span> added</span>
                    <span class="badge bg-danger me-2">-<span id="removed">0</span> removed</span>
                    <span class="badge bg-warning text-dark">~<span id="changed">0</span> changed blocks</span>
                </div>
                <div id="diffView" class="border rounded p-3 bg-light font-monospace small" style="white-space: pre-wrap; overflow-x: auto;"></div>
            </div>
        </div>
    </div>
    <script>
        function esc(s) { return (s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
        async function run() {
            const left = document.getElementById('left').value;
            const right = document.getElementById('right').value;
            const resp = await fetch('/utils/diff/compare', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({left, right})
            });
            const data = await resp.json();
            document.getElementById('added').textContent = data.added;
            document.getElementById('removed').textContent = data.removed;
            document.getElementById('changed').textContent = data.changed;

            const leftLines = data.leftLines;
            const deltas = data.deltas;
            let out = '';
            let cursor = 0;
            deltas.forEach(d => {
                for (let i = cursor; i < d.sourceStart; i++) out += '  ' + esc(leftLines[i]) + '\n';
                d.sourceLines.forEach(line => out += '<span class="bg-danger bg-opacity-25">- ' + esc(line) + '</span>\n');
                d.targetLines.forEach(line => out += '<span class="bg-success bg-opacity-25">+ ' + esc(line) + '</span>\n');
                cursor = d.sourceStart + d.sourceLines.length;
            });
            for (let i = cursor; i < leftLines.length; i++) out += '  ' + esc(leftLines[i]) + '\n';
            document.getElementById('diffView').innerHTML = out || '<em class="text-muted">No differences.</em>';
            document.getElementById('resultArea').classList.remove('d-none');
        }
    </script>
</th:block>
</body>
</html>
