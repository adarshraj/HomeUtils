<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Image Converter', ~{::content})}">
<body>
<th:block th:fragment="content">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">HomeUtils</a></li>
            <li class="breadcrumb-item active">Image Converter</li>
        </ol>
    </nav>
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="bi bi-image me-2"></i>Image Converter &amp; Compressor</h4>
                </div>
                <div class="card-body p-4">
                    <form id="form" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Image file</label>
                            <input type="file" name="file" class="form-control" accept="image/*" required/>
                        </div>
                        <div class="row g-2 mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Target format</label>
                                <select name="format" id="format" class="form-select">
                                    <option value="jpg">JPG (lossy)</option>
                                    <option value="png">PNG (lossless)</option>
                                    <option value="webp">WebP (lossy)</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Max width (px, optional)</label>
                                <input name="maxWidth" type="number" class="form-control" min="1" placeholder="e.g. 1920"/>
                            </div>
                        </div>
                        <div id="qualityBlock" class="mb-3">
                            <label class="form-label fw-semibold">Quality: <span id="qualityLabel">0.85</span></label>
                            <input name="quality" id="quality" type="range" class="form-range" min="0.1" max="1.0" step="0.05" value="0.85"/>
                        </div>
                        <button type="submit" class="btn btn-primary w-100"><i class="bi bi-arrow-right-circle me-1"></i>Convert</button>
                    </form>
                    <div id="errorArea" class="mt-3 alert alert-danger d-none"></div>
                </div>
            </div>
        </div>
    </div>
    <script>
        const qEl = document.getElementById('quality');
        const qLabel = document.getElementById('qualityLabel');
        const qBlock = document.getElementById('qualityBlock');
        qEl.addEventListener('input', e => qLabel.textContent = e.target.value);
        document.getElementById('format').addEventListener('change', e => {
            qBlock.style.display = e.target.value === 'png' ? 'none' : '';
        });
        document.getElementById('form').addEventListener('submit', async e => {
            e.preventDefault();
            const err = document.getElementById('errorArea'); err.classList.add('d-none');
            const fd = new FormData(e.target);
            const resp = await fetch('/utils/image/convert', { method: 'POST', body: fd });
            if (!resp.ok) { err.textContent = await resp.text(); err.classList.remove('d-none'); return; }
            const blob = await resp.blob();
            const disp = resp.headers.get('Content-Disposition') || '';
            const match = disp.match(/filename="(.+)"/);
            const filename = match ? match[1] : 'converted';
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
            URL.revokeObjectURL(url);
        });
    </script>
</th:block>
</body>
</html>
