<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Regex Tester', ~{::content})}">
<body>
<th:block th:fragment="content">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">HomeUtils</a></li>
            <li class="breadcrumb-item active">Regex Tester</li>
        </ol>
    </nav>
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0"><i class="bi bi-asterisk me-2"></i>Regex Tester</h4>
        </div>
        <div class="card-body p-4">
            <div class="mb-3">
                <label class="form-label fw-semibold">Pattern (Java regex syntax)</label>
                <input id="pattern" class="form-control font-monospace" placeholder="e.g. \\b\\w+@\\w+\\.\\w+\\b"/>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold me-2">Flags</label>
                <div class="btn-group" role="group">
                    <input type="checkbox" class="btn-check" id="flag-i" value="i"><label class="btn btn-outline-secondary btn-sm" for="flag-i">i — case insensitive</label>
                    <input type="checkbox" class="btn-check" id="flag-m" value="m"><label class="btn btn-outline-secondary btn-sm" for="flag-m">m — multiline</label>
                    <input type="checkbox" class="btn-check" id="flag-s" value="s"><label class="btn btn-outline-secondary btn-sm" for="flag-s">s — dotall</label>
                    <input type="checkbox" class="btn-check" id="flag-x" value="x"><label class="btn btn-outline-secondary btn-sm" for="flag-x">x — comments</label>
                    <input type="checkbox" class="btn-check" id="flag-u" value="u"><label class="btn btn-outline-secondary btn-sm" for="flag-u">u — unicode</label>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Test string</label>
                <textarea id="input" class="form-control font-monospace" rows="6"></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Replacement (optional) — use $1, $2 for groups</label>
                <input id="replacement" class="form-control font-monospace" placeholder="(leave blank to skip)"/>
            </div>
            <button class="btn btn-primary w-100" onclick="run()"><i class="bi bi-play me-1"></i>Test</button>
            <div id="errorArea" class="mt-3 alert alert-danger d-none"></div>
            <div id="resultArea" class="mt-4 d-none">
                <h6 class="fw-semibold">Matches: <span id="count" class="text-primary">0</span></h6>
                <div id="highlighted" class="border rounded p-3 bg-light font-monospace small" style="white-space: pre-wrap;"></div>
                <div id="matchList" class="mt-3"></div>
                <div id="replacedArea" class="mt-3 d-none">
                    <label class="form-label fw-semibold">Replaced output</label>
                    <textarea id="replaced" class="form-control font-monospace" rows="4" readonly></textarea>
                </div>
            </div>
        </div>
    </div>
    <script>
        function escapeHtml(s) { return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
        function highlight(input, matches) {
            if (matches.length === 0) return escapeHtml(input);
            let out = ''; let cursor = 0;
            matches.forEach(m => {
                out += escapeHtml(input.slice(cursor, m.start));
                out += '<mark class="bg-warning">' + escapeHtml(input.slice(m.start, m.end)) + '</mark>';
                cursor = m.end;
            });
            out += escapeHtml(input.slice(cursor));
            return out;
        }
        async function run() {
            const err = document.getElementById('errorArea'); err.classList.add('d-none');
            const res = document.getElementById('resultArea'); res.classList.add('d-none');
            const flags = ['i','m','s','x','u'].filter(f => document.getElementById('flag-' + f).checked);
            const replacement = document.getElementById('replacement').value;
            const body = {
                pattern: document.getElementById('pattern').value,
                input: document.getElementById('input').value,
                flags,
                ...(replacement ? { replacement } : {})
            };
            const resp = await fetch('/utils/regex/test', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body)
            });
            const data = await resp.json();
            if (!resp.ok || data.error) { err.textContent = data.error || 'Error'; err.classList.remove('d-none'); return; }
            document.getElementById('count').textContent = data.count;
            document.getElementById('highlighted').innerHTML = highlight(body.input, data.matches);
            const list = document.getElementById('matchList'); list.innerHTML = '';
            data.matches.forEach((m, i) => {
                const groups = m.groups.length ? '<div class="small text-muted">Groups: ' + m.groups.map(g => '<code>' + escapeHtml(g ?? 'null') + '</code>').join(', ') + '</div>' : '';
                list.insertAdjacentHTML('beforeend',
                    `<div class="border rounded p-2 mb-1 small">
                        <strong>#${i+1}</strong> <code>${escapeHtml(m.match)}</code>
                        <span class="text-muted">[${m.start}–${m.end}]</span>
                        ${groups}
                    </div>`);
            });
            const ra = document.getElementById('replacedArea');
            if ('replaced' in data) {
                document.getElementById('replaced').value = data.replaced;
                ra.classList.remove('d-none');
            } else ra.classList.add('d-none');
            res.classList.remove('d-none');
        }
    </script>
</th:block>
</body>
</html>
