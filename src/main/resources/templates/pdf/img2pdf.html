<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Images to PDF', ~{::content})}">
<body>
<th:block th:fragment="content">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">HomeUtils</a></li>
            <li class="breadcrumb-item active">Images to PDF</li>
        </ol>
    </nav>
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="bi bi-images me-2"></i>Images to PDF</h4>
                </div>
                <div class="card-body p-4">
                    <p class="text-muted">Upload images in the order you want them to appear. Each image becomes one page.</p>
                    <form id="img2pdfForm" th:action="@{/utils/img2pdf/convert}" method="post" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Images</label>
                            <input type="file" name="files" class="form-control"
                                   accept="image/jpeg,image/png,image/webp,image/gif,image/bmp,image/tiff"
                                   multiple required/>
                            <div class="form-text">Accepted: JPEG, PNG, WebP, GIF, BMP, TIFF. Order matters — first file = first page.</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Output filename</label>
                            <div class="input-group">
                                <input type="text" name="outputName" class="form-control" placeholder="combined" value="combined"/>
                                <span class="input-group-text">.pdf</span>
                            </div>
                        </div>
                        <div class="d-grid">
                            <button type="submit" id="submitBtn" class="btn btn-primary btn-lg">
                                <i class="bi bi-file-earmark-pdf me-2"></i>Create PDF
                            </button>
                        </div>
                    </form>
                    <div id="progressArea" class="mt-3 d-none">
                        <div class="alert alert-info d-flex align-items-center">
                            <div class="spinner-border spinner-border-sm me-3"></div>
                            Building PDF, please wait…
                        </div>
                    </div>
                    <div id="errorArea" class="mt-3 alert alert-danger d-none"></div>
                </div>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('img2pdfForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const progress = document.getElementById('progressArea');
            const error = document.getElementById('errorArea');
            const btn = document.getElementById('submitBtn');
            progress.classList.remove('d-none'); error.classList.add('d-none'); btn.disabled = true;
            try {
                const resp = await fetch(e.target.action, {method: 'POST', body: new FormData(e.target)});
                if (!resp.ok) { throw new Error(await resp.text()); }
                const disposition = resp.headers.get('Content-Disposition') || '';
                const match = disposition.match(/filename="([^"]+)"/);
                const blob = await resp.blob();
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = match ? match[1] : 'combined.pdf';
                a.click();
            } catch(err) {
                error.textContent = err.message; error.classList.remove('d-none');
            } finally {
                progress.classList.add('d-none'); btn.disabled = false;
            }
        });
    </script>
</th:block>
</body>
</html>
