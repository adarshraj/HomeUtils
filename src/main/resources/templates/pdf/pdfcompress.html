<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('PDF Compress', ~{::content})}">
<body>
<th:block th:fragment="content">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">HomeUtils</a></li>
            <li class="breadcrumb-item active">PDF Compress</li>
        </ol>
    </nav>
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="bi bi-file-earmark-zip me-2"></i>PDF Compress</h4>
                </div>
                <div class="card-body p-4">
                    <div class="alert alert-warning small mb-3">
                        <i class="bi bi-exclamation-triangle me-1"></i>
                        Pages are rasterized to JPEG — text will no longer be selectable. Best for scanned or image-heavy PDFs.
                    </div>
                    <form id="form" enctype="multipart/form-data">
                        <input type="file" name="file" class="form-control mb-3" accept="application/pdf" required/>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Render DPI: <span id="dpiLabel">120</span></label>
                            <input name="dpi" id="dpi" type="range" class="form-range" min="50" max="300" step="10" value="120"/>
                            <div class="text-muted small">Lower = smaller file, worse quality. 72–100 for screen, 150+ for print.</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">JPEG Quality: <span id="qualityLabel">0.6</span></label>
                            <input name="quality" id="quality" type="range" class="form-range" min="0.1" max="1.0" step="0.05" value="0.6"/>
                        </div>
                        <button type="submit" class="btn btn-primary w-100"><i class="bi bi-file-earmark-zip me-1"></i>Compress</button>
                    </form>
                    <div id="errorArea" class="mt-3 alert alert-danger d-none"></div>
                </div>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('dpi').addEventListener('input', e => document.getElementById('dpiLabel').textContent = e.target.value);
        document.getElementById('quality').addEventListener('input', e => document.getElementById('qualityLabel').textContent = e.target.value);
        document.getElementById('form').addEventListener('submit', async e => {
            e.preventDefault();
            const err = document.getElementById('errorArea'); err.classList.add('d-none');
            const fd = new FormData(e.target);
            const resp = await fetch('/utils/pdfcompress/compress', { method: 'POST', body: fd });
            if (!resp.ok) { err.textContent = await resp.text(); err.classList.remove('d-none'); return; }
            const blob = await resp.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'compressed.pdf'; a.click();
            URL.revokeObjectURL(url);
        });
    </script>
</th:block>
</body>
</html>
