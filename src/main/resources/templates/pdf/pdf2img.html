<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('PDF to Images', ~{::content})}">
<body>
<th:block th:fragment="content">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">HomeUtils</a></li>
            <li class="breadcrumb-item active">PDF to Images</li>
        </ol>
    </nav>
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="bi bi-file-earmark-image me-2"></i>PDF to Images</h4>
                </div>
                <div class="card-body p-4">
                    <p class="text-muted">Each PDF page is rendered as a PNG. Single-page PDF returns one PNG; multi-page returns a ZIP.</p>
                    <form id="pdf2imgForm" th:action="@{/utils/pdf2img/convert}" method="post" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">PDF file</label>
                            <input type="file" name="file" class="form-control" accept=".pdf" required/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Resolution (DPI)</label>
                            <select name="dpi" class="form-select">
                                <option value="72">72 dpi — screen</option>
                                <option value="150" selected>150 dpi — standard</option>
                                <option value="300">300 dpi — print quality</option>
                            </select>
                        </div>
                        <div class="d-grid">
                            <button type="submit" id="submitBtn" class="btn btn-primary btn-lg">
                                <i class="bi bi-image me-2"></i>Extract Images
                            </button>
                        </div>
                    </form>
                    <div id="progressArea" class="mt-3 d-none">
                        <div class="alert alert-info d-flex align-items-center">
                            <div class="spinner-border spinner-border-sm me-3"></div>
                            Rendering pages, please wait…
                        </div>
                    </div>
                    <div id="errorArea" class="mt-3 alert alert-danger d-none"></div>
                </div>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('pdf2imgForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const progress = document.getElementById('progressArea');
            const error = document.getElementById('errorArea');
            const btn = document.getElementById('submitBtn');
            progress.classList.remove('d-none'); error.classList.add('d-none'); btn.disabled = true;
            try {
                const resp = await fetch(e.target.action, {method: 'POST', body: new FormData(e.target)});
                if (!resp.ok) { throw new Error(await resp.text()); }
                const disposition = resp.headers.get('Content-Disposition') || '';
                const match = disposition.match(/filename="([^"]+)"/);
                const blob = await resp.blob();
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = match ? match[1] : 'pages.png';
                a.click();
            } catch(err) {
                error.textContent = err.message; error.classList.remove('d-none');
            } finally {
                progress.classList.add('d-none'); btn.disabled = false;
            }
        });
    </script>
</th:block>
</body>
</html>
