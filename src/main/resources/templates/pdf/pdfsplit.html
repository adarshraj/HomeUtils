<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('PDF Split', ~{::content})}">
<body>
<th:block th:fragment="content">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">HomeUtils</a></li>
            <li class="breadcrumb-item active">PDF Split</li>
        </ol>
    </nav>
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="bi bi-scissors me-2"></i>PDF Split</h4>
                </div>
                <div class="card-body p-4">
                    <p class="text-muted small">Each page is extracted as its own PDF, then packaged into a ZIP for download.</p>
                    <form id="form" enctype="multipart/form-data">
                        <input type="file" name="file" class="form-control mb-3" accept="application/pdf" required/>
                        <button type="submit" class="btn btn-primary w-100"><i class="bi bi-scissors me-1"></i>Split</button>
                    </form>
                    <div id="errorArea" class="mt-3 alert alert-danger d-none"></div>
                </div>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('form').addEventListener('submit', async e => {
            e.preventDefault();
            const err = document.getElementById('errorArea'); err.classList.add('d-none');
            const fd = new FormData(e.target);
            const resp = await fetch('/utils/pdfsplit/split', { method: 'POST', body: fd });
            if (!resp.ok) { err.textContent = await resp.text(); err.classList.remove('d-none'); return; }
            const blob = await resp.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'split_pages.zip'; a.click();
            URL.revokeObjectURL(url);
        });
    </script>
</th:block>
</body>
</html>
